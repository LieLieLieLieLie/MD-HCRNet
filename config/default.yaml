model:
  embed_dim: 768
  num_heads: 12
  num_layers: 6          # ViT encoder layers per branch
  patch_size: 16
  img_height: 256
  img_width: 192
  use_mamba: false       # set true if mamba-ssm is installed
  freeze_backbone: true  # freeze ViT backbone during training
  joint_query_layers: 2
  use_direct_joint_decoder: true
  direct_joint_zero_init: true
  depth_estimator: "depth_anything_v2"   # or "simple_unet"

mano:
  model_path: "data/mano"   # directory containing MANO_RIGHT.pkl
  use_pca: false
  num_pca_comps: 45
  is_rhand: true
  flat_hand_mean: false

data:
  root: "data"
  dataset: "freihand"        # freihand | rhd
  batch_size: 64             # 4080 16GB 可跑 64，若OOM改为32
  num_workers: 8
  img_height: 256
  img_width: 192
  use_aug: false             # false=只用基础集(~29k)，速度快；true=4x增广(~117k)
  # augmentation
  random_flip: true
  color_jitter: true
  random_crop: true
  crop_scale: [0.8, 1.2]
  rotation_deg: 30

train:
  epochs: 100                # 4080单卡 100epoch ≈ 1~1.5h
  lr: 1e-4
  backbone_lr: 1e-5        # separate lr for ViT backbone if not frozen
  weight_decay: 1e-4
  warmup_epochs: 5
  lr_decay_epochs: [70, 90]
  lr_decay_factor: 0.1
  save_freq: 10             # save checkpoint every N epochs
  log_freq: 50              # log every N iterations
  output_dir: "outputs"
  amp: true                  # 混合精度(BF16)，4080强烈推荐开启
  amp_dtype: "bfloat16"      # bfloat16 更稳定；若有问题改 float16

loss:
  lambda_joints3d: 1.0
  lambda_joints2d: 1.0
  lambda_vertices: 1.0
  lambda_beta: 0.001
  lambda_theta: 0.001
  lambda_joint_residual: 0.01
  lambda_aux_refine: 0.3
  lambda_uhr_joints3d: 0.5
  lambda_depth_joints3d: 0.5   # stage-1 supervision weight
  lambda_depth_joints2d: 0.5

eval:
  checkpoint: ""
  dataset: "freihand"
